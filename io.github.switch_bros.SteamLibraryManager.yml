id: io.github.switch_bros.SteamLibraryManager
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
base: com.riverbankcomputing.PyQt.BaseApp
base-version: '6.10'
command: steam-library-manager
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  # Steam native (rw: writes collections, shortcuts, grid images)
  - --filesystem=xdg-data/Steam:rw
  - --filesystem=~/.steam:ro
  # Steam Flatpak (rw: same reason as above)
  - --filesystem=~/.var/app/com.valvesoftware.Steam/data/Steam:rw
  # Lutris native (detect games for non-Steam shortcut import)
  - --filesystem=xdg-data/lutris:ro
  # Lutris Flatpak
  - --filesystem=~/.var/app/net.lutris.Lutris/data/lutris:ro
  # Heroic native (Epic/GOG/Amazon game detection)
  - --filesystem=xdg-config/heroic:ro
  # Heroic Flatpak
  - --filesystem=~/.var/app/com.heroicgameslauncher.hgl/config/heroic:ro
  # Bottles native (detect games for non-Steam shortcut import)
  - --filesystem=xdg-data/bottles:ro
  # Bottles Flatpak
  - --filesystem=~/.var/app/com.usebottles.bottles/data/bottles:ro
  # itch.io native (detect games for non-Steam shortcut import)
  - --filesystem=xdg-config/itch:ro
  # Detect installed Flatpak games
  - --filesystem=xdg-data/flatpak:ro

cleanup-commands:
  - /app/cleanup-BaseApp.sh

modules:
  - python3-dependencies.json

  - name: steam-library-manager
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app . --no-build-isolation --no-deps
      - install -Dm644 flatpak/io.github.switch_bros.SteamLibraryManager.desktop
          /app/share/applications/io.github.switch_bros.SteamLibraryManager.desktop
      - install -Dm644 flatpak/io.github.switch_bros.SteamLibraryManager.metainfo.xml
          /app/share/metainfo/io.github.switch_bros.SteamLibraryManager.metainfo.xml
      - install -Dm644 flatpak/io.github.switch_bros.SteamLibraryManager.svg
          /app/share/icons/hicolor/scalable/apps/io.github.switch_bros.SteamLibraryManager.svg
      - install -Dm644 LICENSE
          /app/share/licenses/io.github.switch_bros.SteamLibraryManager/LICENSE
    sources:
      - type: git
        url: https://github.com/Switch-Bros/SteamLibraryManager.git
        tag: v1.3.8
        commit: 268b57e4e6d1bf612f60b153534c5a7983812268
